name: Daily Patent Docket Report

on:
  schedule:
    # 6:00 AM Eastern (11:00 UTC) every weekday.
    # Adjust the cron expression if you need a different time.
    - cron: "0 11 * * 1-5"
  workflow_dispatch:  # Manual trigger from the GitHub Actions UI

jobs:
  generate-docket-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit the output file back to this repo

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      # -----------------------------------------------------------------------
      # 3. Install Python dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 4. Install Playwright's Chromium browser binary.
      #
      #    playwright install only fetches the browser; --with-deps installs
      #    the OS-level shared libraries Chromium needs on Ubuntu.
      # -----------------------------------------------------------------------
      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      # -----------------------------------------------------------------------
      # 5. Download the AppColl CSV export via headless browser automation.
      #
      #    Prerequisites — add these repository secrets:
      #      APPCOLL_EMAIL     AppColl login email address
      #      APPCOLL_PASSWORD  AppColl login password
      #
      #    The script logs in, navigates to Tasks.aspx, clicks the CSV export
      #    button, intercepts the download, and saves it to
      #    data/appcoll_exports/appcoll_export_YYYY-MM-DD.csv where
      #    csv_loader.py will find it automatically (USE_LATEST_CSV = True).
      #
      #    On failure the script saves debug screenshots to debug_screenshots/
      #    and exits with code 1 (which fails this step and the whole job).
      # -----------------------------------------------------------------------
      - name: Download AppColl CSV export
        env:
          APPCOLL_EMAIL: ${{ secrets.APPCOLL_EMAIL }}
          APPCOLL_PASSWORD: ${{ secrets.APPCOLL_PASSWORD }}
        run: |
          mkdir -p data/appcoll_exports
          python scripts/appcoll_downloader.py
          echo "Downloaded CSV:"
          ls -lh data/appcoll_exports/

      # -----------------------------------------------------------------------
      # 6. Upload debug screenshots as an artifact if the download step failed.
      #
      #    This step runs even when step 5 fails (if: always()) so you can
      #    download the screenshots from the Actions run summary to diagnose
      #    login or selector issues.
      # -----------------------------------------------------------------------
      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_screenshots/
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # 7. Generate the docket report.
      #
      #    The script writes output to vault_output/Docket/Daily/<date>.md
      #    in this repository. Obsidian Git can then pull from this repo to
      #    sync the file to your local Obsidian vault.
      #
      #    OBSIDIAN_VAULT_PATH is set to the vault_output/ subdirectory of
      #    the repository checkout, so no additional secret is required.
      #    OBSIDIAN_DOCKET_SUBFOLDER is empty because the full path already
      #    includes Docket/Daily inside vault_output/.
      # -----------------------------------------------------------------------
      - name: Generate docket report
        env:
          OBSIDIAN_VAULT_PATH: ${{ github.workspace }}/vault_output
        run: python scripts/main.py

      # -----------------------------------------------------------------------
      # 8. Commit and push the generated Markdown back to this repository.
      #
      #    Uses the built-in GITHUB_TOKEN — no additional secret needed.
      #    The committed file will appear in vault_output/Docket/Daily/.
      #
      #    Point your Obsidian Git plugin at this repository and configure
      #    it to pull automatically. The docket note will appear under
      #    Docket/Daily/ in your vault (treat vault_output/ as the vault root,
      #    or adjust OBSIDIAN_DOCKET_SUBFOLDER in config/globals.py).
      # -----------------------------------------------------------------------
      - name: Commit and push docket report
        run: |
          git config user.name "Docket Bot"
          git config user.email "docket-bot@users.noreply.github.com"
          git add vault_output/
          git diff --cached --quiet \
            && echo "No changes to commit (report unchanged)." \
            || git commit -m "chore: daily docket report $(date +%Y-%m-%d)"
          git push
