# config/rules.yaml

rules:

  # ---------------------------------------------------------------------------
  # PCT NATIONAL PHASE FILING 1
  # ---------------------------------------------------------------------------
  - id: 1_pct_national_phase_filing
    description: Tasks for national phase filing of a PCT application.
    conditions:
      - field: task_status
        op: eq
        value: "Open"
      - field: task_type
        op: contains
        value: "open.*PCT.*application"
      - field: matter_type
        op: contains
        value: "provisional"
    tasks:
      - name: Meet with responsible inventor for SEP and national phase filing discussion
        offset_days: 45
        help_key: pct_national_phase_filing_inventor_meeting
      - name: Draft claims for national phase filing
        offset_days: 40
        help_key: pct_national_phase_filing_claims 
      - name: WPM review of national phase filing strategy and claims
        offset_days: 30
        help_key: pct_national_phase_filing_wpm_review
      - name: Finalize and file national phase application
        offset_days: 20
        help_key: pct_national_phase_filing_finalize     
  
  # ---------------------------------------------------------------------------
  # PCT NATIONAL PHASE FILING 2
  # ---------------------------------------------------------------------------
  - id: 2_pct_national_phase_filing
    description: Tasks for national phase filing of a PCT application.
    conditions:
      - field: task_status
        op: eq
        value: "Open"
      - field: task_type
        op: contains
        value: "file.*PCT.*application"
      - field: matter_type
        op: contains
        value: "pct"
      - field: matter_status
        op: contains
        value: "unfiled"
    tasks:
      - name: Meet with responsible inventor for SEP and national phase filing discussion
        offset_days: 30
        help_key: pct_national_phase_filing_inventor_meeting
      - name: Draft claims for national phase filing
        offset_days: 25
        help_key: pct_national_phase_filing_claims 
      - name: WPM review of national phase filing strategy and claims
        offset_days: 20
        help_key: pct_national_phase_filing_wpm_review
      - name: Finalize and file national phase application
        offset_days: 15
        help_key: pct_national_phase_filing_finalize   

  # ---------------------------------------------------------------------------
  # SEP OFFICE ACTION RESPONSE
  # ---------------------------------------------------------------------------
  - id: us_oa_response_sep
    description: Tasks for responding to a US office action marked as SEP.
    conditions:
      - field: country
        op: eq
        value: "US"
      - field: task_type
        op: matches
        value: "(Respond to Non.?Final Office Action|Respond to Office Action|Office Action Response|Respond to Final Office Action|Respond to Final OA|Final Office Action|Final OA)"
      - field: sep_status
        op: is_not_null
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Prepare response strategy
        offset_days: 30
        help_key: us_oa_sep_review
      - name: Meet with responsible inventor to discuss response strategy
        offset_days: 25
        help_key: us_oa_sep_review_inventor_meeting
      - name: Obtain WPM approval for proposed response strategy and amendments
        offset_days: 20
        help_key: us_oa_sep_wpm
      - name: Draft and file response
        offset_days: 10
        help_key: us_oa_sep_finalize
  
  # ---------------------------------------------------------------------------
  # FOREIGN DIV FILING
  # ---------------------------------------------------------------------------
  - id: us_oa_response_sep
    description: Tasks for filing a foreign divisional application.
    conditions:
      - field: country
        op: ne
        value: "US"
      - field: task_type
        op: matches
        value: "(file.*divisional|foreign.*open.*div)"
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Meet with responsible inventor to discuss DIV strategy
        offset_days: 20
        help_key: foreign_div_inventor_meeting
      - name: Obtain WPM approval for proposed response strategy and amendments
        offset_days: 10
        help_key: foreign_div_wpm
      - name: File divisional application
        offset_days: 5
        help_key: foreign_div_finalize

  
  # ---------------------------------------------------------------------------
  # US CON FILING
  # ---------------------------------------------------------------------------
  - id: us_oa_response_sep
    description: Tasks for filing a US CON application.
    conditions:
      - field: country
        op: eq
        value: "US"
      - field: task_type
        op: matches
        value: "(file.*continuing|open.*continuation)"
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Meet with responsible inventor to discuss US CON strategy
        offset_days: 20
        help_key: con_inventor_meeting
      - name: Obtain WPM approval for proposed response strategy and amendments
        offset_days: 10
        help_key: con_wpm
      - name: File divisional application
        offset_days: 5
        help_key: con_finalize


