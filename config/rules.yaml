# config/rules.yaml

rules:
  
  # ---------------------------------------------------------------------------
  # SEP PCT FILING
  # ---------------------------------------------------------------------------
  - id: sep_pct_filing
    description: Tasks for filing of a PCT application.
    conditions:
      - field: task_status
        op: eq
        value: "Open"
      - field: task_type
        op: matches
        value: "(file.*PCT.*application)"
      - field: sep_status
        op: is_not_null
    tasks:
      - name: Claims review meeting with inventor
        offset_days: 20
        help_key: pct_filing_inventor_meeting
      - name: Confirm SEP status
        offset_days: 20
      - name: Revise claims from provisional application
        offset_days: 15
      - name: WPM approval for claims
        offset_days: 10
        help_key: pct_filing_wpm
      - name: Finalize and file PCT application
        offset_days: 5
        help_key: pct_filing_finalize   

  # ---------------------------------------------------------------------------
  # PCT FILING
  # ---------------------------------------------------------------------------
  - id: pct_filing
    description: Tasks for filing of a PCT application.
    conditions:
      - field: task_status
        op: eq
        value: "Open"
      - field: task_type
        op: matches
        value: "(file.*PCT.*application)"
      - field: sep_status
        op: is_null
    tasks:
      - name: Claims review meeting with inventor
        offset_days: 20
        help_key: inventor_email
      - name: Confirm SEP status
        offset_days: 20
      - name: Revise claims from provisional application
        offset_days: 15
      - name: Finalize and file PCT application
        offset_days: 5
        help_key: pct_filing_finalize  

  # ---------------------------------------------------------------------------
  # SEP OFFICE ACTION RESPONSE
  # ---------------------------------------------------------------------------
  - id: us_oa_response_sep
    description: Tasks for responding to a US office action marked as SEP.
    conditions:
      - field: country
        op: eq
        value: "US"
      - field: task_type
        op: matches
        value: "(Respond.*Office Action|Office Action.*Response|Reply.*Office Action|Respond*.Advisory.*Action|Reply.*Advisory.*Action|Advisory.*Action.*Response)"
      - field: sep_status
        op: is_not_null
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Response strategy meeting with inventor
        offset_days: 15
        help_key: us_oa_sep_review_inventor_meeting
      - name: WPM approval for response strategy
        offset_days: 10
        help_key: us_oa_sep_wpm
      - name: Examiner interview
        offset_days: 5
        help_key: us_oa_sep_interview
      - name: Finalize and file response
        offset_days: 1
        help_key: us_oa_sep_finalize
  
  # ---------------------------------------------------------------------------
  # SEP FOREIGN DIV FILING
  # ---------------------------------------------------------------------------
  - id: foreign_div_filing_sep
    description: Tasks for filing a foreign divisional application.
    conditions:
      - field: country
        op: ne
        value: "US"
      - field: task_type
        op: matches
        value: "(file.*(divisional|div))"
      - field: sep_status
        op: is_not_null
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Claims review meeting with inventor
        offset_days: 15
        help_key: foreign_div_inventor_meeting
      - name: Draft DIV claims
        offset_days: 12
        help_key: foreign_div_draft
      - name: WPM approval for DIV claims
        offset_days: 10
        help_key: foreign_div_wpm
      - name: Finalize and file foreign DIV
        offset_days: 7
        help_key: foreign_div_finalize

  
  # ---------------------------------------------------------------------------
  # SEP US CON FILING
  # ---------------------------------------------------------------------------
  - id: us_con_filing_sep
    description: Tasks for filing a US CON application.
    conditions:
      - field: country
        op: eq
        value: "US"
      - field: task_type
        op: matches
        value: "(file.*(continuing|continuation))"
      - field: sep_status
        op: is_not_null
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Claims review meeting with inventor
        offset_days: 15
        help_key: con_inventor_meeting
      - name: Draft CON claims
        offset_days: 12
      - name: WPM approval for CON claims
        offset_days: 10
        help_key: con_wpm
      - name: Finalize and file US CON 
        offset_days: 7
        help_key: con_finalize

  # ---------------------------------------------------------------------------
  # US CON FILING
  # ---------------------------------------------------------------------------
  - id: us_con_filing
    description: Tasks for filing a US CON application.
    conditions:
      - field: country
        op: eq
        value: "US"
      - field: task_type
        op: matches
        value: "(file.*(continuing|continuation))"
      - field: sep_status
        op: is_null
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Claims review meeting with inventor
        offset_days: 15
        help_key: con_inventor_meeting
      - name: Confirm SEP status
        offset_days: 15
      - name: Draft CON claims
        offset_days: 12
      - name: Finalize and file US CON 
        offset_days: 7
        help_key: con_finalize

  # ---------------------------------------------------------------------------
  # SEP FOREIGN OFFICE ACTION RESPONSE
  # ---------------------------------------------------------------------------
  - id: us_oa_response_sep
    description: Tasks for responding to a foreign office action marked as SEP.
    conditions:
      - field: country
        op: ne
        value: "US"
      - field: task_type
        op: matches
        value: "((Reply|Respond).*(Search Report|Office Action|ISR.?WO|Written Opinion)|(EP.?WO|Office Action|ISR.?WO|Written Opinion).*Response)"
      - field: sep_status
        op: is_not_null
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Response strategy meeting with inventor
        offset_days: 15
        help_key: us_oa_sep_review_inventor_meeting
      - name: WPM approval for response strategy
        offset_days: 12
        help_key: us_oa_sep_wpm
      - name: Finalize and send instructions to foreign associate
        offset_days: 7
        help_key: us_oa_sep_finalize

  # ---------------------------------------------------------------------------
  # FOREIGN ISSUE FEE
  # ---------------------------------------------------------------------------
  - id: foreign_issue_fee
    description: Tasks for responding to foreign grant/issue fee.
    conditions:
      - field: country
        op: ne
        value: "US"
      - field: task_type
        op: matches
        value: "((Reply|Respond).*(Grant|Issue|Grant.?Issue))"
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Review for amendments
        offset_days: 10
        help_key: foreign_issue_fee_review
      - name: Finalize instructions and send to foreign associate
        offset_days: 7
        help_key: foreign_issue_fee_finalize

  # ---------------------------------------------------------------------------
  # US ISSUE FEE
  # ---------------------------------------------------------------------------
  - id: us_issue_fee
    description: Tasks for responding to US issue fee.
    conditions:
      - field: country
        op: eq
        value: "US"
      - field: task_type
        op: matches
        value: "(Issue.*Fee)"
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Review for 312 amendment/statement on allowance
        offset_days: 3
        help_key: us_issue_fee_review
      - name: Pay issue fee; file 312 amendment/statement
        offset_days: 1
        help_key: us_issue_fee_finalize

  # ---------------------------------------------------------------------------
  # NEW PROVISIONAL APPLICATION
  # ---------------------------------------------------------------------------
  - id: provisional_filing
    description: Tasks for preparing a new provisional application.
    conditions:
      - field: task_status
        op: eq
        value: "Open"
      - field: task_type
        op: matches
        value: "(file.*provisional.*application)"
      - field: matter_type
        op: matches
        value: "(?i)provisional"
    tasks:
      - name: Disclosure meeting with inventor
        offset_days: 25
        help_key: inventor_email
      - name: FCR meeting
        offset_days: 20
        help_key: fcr_meeting
      - name: Draft application
        offset_days: 15
      - name: Finalize/file application
        offset_days: 5

  # ---------------------------------------------------------------------------
  # SEP PCT US FILING
  # ---------------------------------------------------------------------------
  - id: sep_pct_us_filing
    description: Tasks for national phase filing of a PCT application marked as SEP.
    conditions:
      - field: task_status
        op: eq
        value: "Open"
      - field: task_type
        op: matches
        value: "(file US national phase application)"
      - field: sep_status
        op: is_not_null
    tasks:
      - name: Claims review meeting with inventor
        offset_days: 25
        help_key: pct_filing_inventor_meeting
      - name: Identify foreign jurisdictions for national phase entry
        offset_days: 20
      - name: Revise claims from PCT application
        offset_days: 15
      - name: WPM approval for claims
        offset_days: 10
        help_key: pct_filing_wpm
      - name: Finalize and file in US and foreign jurisdictions
        offset_days: 5
        help_key: pct_filing_finalize  

  # ---------------------------------------------------------------------------
  # PCT US FILING
  # ---------------------------------------------------------------------------
  - id: pct_us_filing
    description: Tasks for national phase filing of a PCT application.
    conditions:
      - field: task_status
        op: eq
        value: "Open"
      - field: task_type
        op: matches
        value: "(file US national phase application)"
      - field: sep_status
        op: is_null
    tasks:
      - name: Claims review meeting with inventor
        offset_days: 20
        help_key: pct_filing_inventor_meeting
      - name: Confirm SEP status
        offset_days: 20
      - name: Identify foreign jurisdictions for national phase entry
        offset_days: 20
      - name: Revise claims from PCT application
        offset_days: 15
      - name: Finalize and file in US and foreign jurisdictions
        offset_days: 5

