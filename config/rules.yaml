# config/rules.yaml
#
# SCHEMA:
# rules:
#   - id: <unique_string_id>          # Required. Used in logs and debugging.
#     description: <human_readable>   # Optional.
#     conditions:                     # ALL conditions must be true (logical AND).
#       - field: <python_field_name>  # Normalized column header mapped to readable python variable name. See README.md, section "Customizing Rules", "Note on Column Headers"
#         op: <operator>              # One of: eq, ne, contains, matches, gt, lt,
#                                     #   gte, lte, is_null, is_not_null, in, not_in
#         value: <value>              # Comparison value (omit for is_null/is_not_null).
#     tasks:
#       - name: <task_name>           # Display name of the task.
#         offset_days: <int>          # Days before deadline when this task should be done.
#                                     # Largest offset = highest subpriority (most urgent).
#         help_key: <string>          # Key to look up in task_help.yaml. Optional.
#
# OPERATORS:
#   eq          - exact equality (case-insensitive for strings)
#   ne          - not equal
#   contains    - substring match (case-insensitive)
#   matches     - full Python regex search against the field value
#   gt/lt       - numeric or date greater/less than
#   gte/lte     - numeric or date greater/less than or equal
#   is_null     - field is empty/null/NaN
#   is_not_null - field is not empty
#   in          - field value is in a provided list
#   not_in      - field value is not in a provided list
#
# HOW TO ADD A RULE:
#   1. Copy an existing rule block.
#   2. Give it a unique `id`.
#   3. Set conditions to match the desired docket entry characteristics.
#   4. Define tasks with names and offset_days values.
#   5. Optionally add a help_key referencing an entry in task_help.yaml.
#
# HOW TO EDIT A RULE:
#   Modify any field within the rule. Changing `id` breaks log references.
#
# HOW TO DELETE A RULE:
#   Remove the entire rule block (from `- id:` to the end of its `tasks:` list).
#
# ---------------------------------------------------------------------------

