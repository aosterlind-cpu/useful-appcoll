# config/rules.yaml

rules:
  
  # ---------------------------------------------------------------------------
  # PCT NATIONAL PHASE FILING
  # ---------------------------------------------------------------------------
  - id: sep_pct_national_phase_filing
    description: Tasks for national phase filing of a PCT application.
    conditions:
      - field: task_status
        op: eq
        value: "Open"
      - field: task_type
        op: matches
        value: "(file.*PCT.*application|PCT.*file*national.*phase)"
      - field: sep_status
        op: is_not_null
    tasks:
      - name: Meet with responsible inventor; draft claims
        offset_days: 20
        help_key: pct_national_phase_filing_inventor_meeting
      - name: Obtain WPM approval for claims
        offset_days: 10
        help_key: pct_national_phase_filing_wpm
      - name: Finalize and file national phase application
        offset_days: 1
        help_key: pct_national_phase_filing_finalize   

  # ---------------------------------------------------------------------------
  # SEP OFFICE ACTION RESPONSE
  # ---------------------------------------------------------------------------
  - id: us_oa_response_sep
    description: Tasks for responding to a US office action marked as SEP.
    conditions:
      - field: country
        op: eq
        value: "US"
      - field: task_type
        op: matches
        value: "(Respond to Non.?Final Office Action|Respond to Office Action|Office Action Response|Respond to Final Office Action|Respond to Final OA|Final Office Action|Final OA)"
      - field: sep_status
        op: is_not_null
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Meet with responsible inventor; discuss response strategy
        offset_days: 20
        help_key: us_oa_sep_review_inventor_meeting
      - name: Obtain WPM approval for response strategy
        offset_days: 15
        help_key: us_oa_sep_wpm
      - name: Conduct USPTO interview
        offset_days: 10
        help_key: us_oa_sep_interview
      - name: Finalize and file response
        offset_days: 1
        help_key: us_oa_sep_finalize

  # ---------------------------------------------------------------------------
  # SEP ADVISORY ACTION RESPONSE
  # ---------------------------------------------------------------------------
  - id: us_oa_response_sep
    description: Tasks for responding to a US advisory action marked as SEP.
    conditions:
      - field: country
        op: eq
        value: "US"
      - field: task_type
        op: matches
        value: "(Respond.*Advisory.*Action|Response.*Advisory.*Action|Advisory.*Action.*Response)"
      - field: sep_status
        op: is_not_null
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Meet with responsible inventor; discuss response strategy
        offset_days: 15
        help_key: us_oa_sep_review_inventor_meeting
      - name: Obtain WPM approval for response strategy
        offset_days: 10
        help_key: us_oa_sep_wpm
      - name: Finalize and file response with RCE
        offset_days: 1
        help_key: us_oa_sep_finalize
  
  # ---------------------------------------------------------------------------
  # FOREIGN DIV FILING
  # ---------------------------------------------------------------------------
  - id: foreign_div_filing_sep
    description: Tasks for filing a foreign divisional application.
    conditions:
      - field: country
        op: ne
        value: "US"
      - field: task_type
        op: matches
        value: "(file.*(divisional|div))"
      - field: sep_status
        op: is_not_null
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Meet with responsible inventor; draft DIV claims
        offset_days: 15
        help_key: foreign_div_inventor_meeting
      - name: Obtain WPM approval for DIV claims
        offset_days: 10
        help_key: foreign_div_wpm
      - name: Finalize and file foreign DIV
        offset_days: 5
        help_key: foreign_div_finalize

  
  # ---------------------------------------------------------------------------
  # US CON FILING
  # ---------------------------------------------------------------------------
  - id: us_con_filing_sep
    description: Tasks for filing a US CON application.
    conditions:
      - field: country
        op: eq
        value: "US"
      - field: task_type
        op: matches
        value: "(file.*(continuing|continuation))"
      - field: sep_status
        op: is_not_null
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Meet with responsible inventor; draft CON claims
        offset_days: 15
        help_key: con_inventor_meeting
      - name: Obtain WPM approval for CON claims
        offset_days: 10
        help_key: con_wpm
      - name: Finalize and file US CON 
        offset_days: 5
        help_key: con_finalize

  # ---------------------------------------------------------------------------
  # SEP FOREIGN OFFICE ACTION RESPONSE
  # ---------------------------------------------------------------------------
  - id: us_oa_response_sep
    description: Tasks for responding to a foreign office action marked as SEP.
    conditions:
      - field: country
        op: ne
        value: "US"
      - field: task_type
        op: matches
        value: "((Reply|Respond).*(Search Report|Office Action|ISR.?WO|Written Opinion)|(EP.?WO|Office Action|ISR.?WO|Written Opinion).*Response)"
      - field: sep_status
        op: is_not_null
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Meet with responsible inventor; discuss response strategy
        offset_days: 15
        help_key: us_oa_sep_review_inventor_meeting
      - name: Obtain WPM approval for response strategy
        offset_days: 10
        help_key: us_oa_sep_wpm
      - name: Finalize and send instructions to foreign associate
        offset_days: 5
        help_key: us_oa_sep_finalize

  # ---------------------------------------------------------------------------
  # FOREIGN ISSUE FEE
  # ---------------------------------------------------------------------------
  - id: foreign_issue_fee
    description: Tasks for responding to foreign grant/issue fee.
    conditions:
      - field: country
        op: ne
        value: "US"
      - field: task_type
        op: matches
        value: "((Reply|Respond).*(Grant|Issue|Grant.?Issue))"
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Review for amendments
        offset_days: 3
        help_key: foreign_issue_fee_review
      - name: Finalize instructions and send to foreign associate
        offset_days: 1
        help_key: foreign_issue_fee_finalize

  # ---------------------------------------------------------------------------
  # US ISSUE FEE
  # ---------------------------------------------------------------------------
  - id: us_issue_fee
    description: Tasks for responding to US issue fee.
    conditions:
      - field: country
        op: eq
        value: "US"
      - field: task_type
        op: matches
        value: "(Issue.*Fee)"
      - field: task_status
        op: eq
        value: "Open"
    tasks:
      - name: Review for 312 amendment/statement on allowance
        offset_days: 3
        help_key: us_issue_fee_review
      - name: Pay issue fee; file 312 amendment/statement
        offset_days: 1
        help_key: us_issue_fee_finalize

