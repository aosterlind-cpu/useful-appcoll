# config/task_help.yaml
#
# SCHEMA:
# task_help:
#   <help_key>:
#     label: <display_label>          # Section label shown in output. Optional.
#     fields:                         # Ordered list of CSV field names to display.
#       - field: <python_field_name>
#         label: <display_label>      # Label for this field in output.
#
# HOW TO ADD A NEW TASK HELP ENTRY:
#   1. Add a new key under task_help:.
#   2. Optionally set a label.
#   3. List the fields (using Python field names from the CSV field reference)
#      and their display labels.
#
# HOW TO EDIT: Change field names or labels as needed.
# HOW TO DELETE: Remove the entire key block.
#
# Fields with null/empty values in the CSV are silently omitted from output.
# ---------------------------------------------------------------------------

task_help:

  us_oa_response_sep:
